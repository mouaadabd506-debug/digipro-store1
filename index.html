<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noqta — السوق الرقمي العالمي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09080A; --s1:#110F14; --s2:#1A1720; --s3:#221F2B;
  --bd:#2E2A38; --bd2:#3D3849;
  --tx:#F2EFF9; --mx:#A09BB0; --dim:#605A72;
  --ac:#C084FC; --ac2:#F59E0B; --ac3:#22D3EE;
  --btc:#F7931A; --eth:#627EEA; --sol:#9945FF; --usdt:#26A17B; --bnb:#F3BA2F;
  --green:#10B981; --red:#EF4444;
  --grd:linear-gradient(135deg,#C084FC,#818CF8);
  --grd2:linear-gradient(135deg,#F59E0B,#FB923C);
  --grd3:linear-gradient(135deg,#22D3EE,#6366F1);
  --mono:'DM Mono',monospace;
  --display:'Unbounded',sans-serif;
  --sans:'IBM Plex Sans Arabic',sans-serif;
  --r:14px; --r2:20px; --r3:28px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:99px}
::selection{background:rgba(192,132,252,.3);color:var(--tx)}

/* KEYFRAMES */
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.8)}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(192,132,252,.3)}50%{box-shadow:0 0 40px rgba(192,132,252,.6)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes borderRun{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* GRAIN OVERLAY */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:150px;
}

/* ─── ANNOUNCEMENT BAR ─── */
.ann-bar{
  background:linear-gradient(90deg,#C084FC,#818CF8,#22D3EE,#C084FC);
  background-size:300%;animation:borderRun 5s linear infinite;
  padding:.5rem 0;text-align:center;font-size:.78rem;font-weight:600;
  color:#fff;letter-spacing:.5px;position:relative;z-index:10;
}

/* ─── NAV ─── */
nav{
  position:sticky;top:0;z-index:300;
  background:rgba(9,8,10,.85);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2.5rem;height:64px;
}
.logo{display:flex;align-items:center;gap:.7rem;text-decoration:none;color:var(--tx)}
.logo-icon{
  width:34px;height:34px;border-radius:10px;
  background:var(--grd);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:.85rem;font-weight:900;color:#fff;
  box-shadow:0 4px 16px rgba(192,132,252,.4);
}
.logo-name{font-family:var(--display);font-size:.95rem;font-weight:700;letter-spacing:1px}

.nav-links{display:flex;gap:1.8rem;list-style:none}
.nav-links a{font-size:.83rem;font-weight:500;color:var(--mx);text-decoration:none;transition:color .2s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-4px;right:0;width:0;height:1.5px;background:var(--ac);transition:width .3s}
.nav-links a:hover{color:var(--tx)} .nav-links a:hover::after{width:100%}

.nav-right{display:flex;align-items:center;gap:.75rem}

.currency-toggle{
  display:flex;background:var(--s2);border:1px solid var(--bd);
  border-radius:99px;overflow:hidden;
}
.cur-btn{
  padding:.35rem .75rem;font-size:.73rem;font-weight:600;
  font-family:var(--mono);border:none;background:none;
  color:var(--mx);cursor:pointer;transition:all .2s;
}
.cur-btn.active{background:var(--ac);color:#fff}

.icon-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--s2);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.95rem;transition:all .2s;
  color:var(--mx);
}
.icon-btn:hover{border-color:var(--ac);color:var(--ac)}

.nav-cart{
  display:flex;align-items:center;gap:.5rem;
  background:var(--grd);color:#fff;border:none;
  padding:.5rem 1.2rem;border-radius:99px;
  font-family:var(--sans);font-size:.83rem;font-weight:600;
  cursor:pointer;transition:all .2s;position:relative;
}
.nav-cart:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(192,132,252,.4)}
.cart-badge{
  position:absolute;top:-5px;left:-5px;
  background:var(--ac2);color:#000;
  width:18px;height:18px;border-radius:50%;
  font-size:.65rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}

/* ─── HERO ─── */
.hero{
  position:relative;min-height:calc(100vh - 100px);
  display:grid;grid-template-columns:1fr 1fr;
  border-bottom:1px solid var(--bd);overflow:hidden;
}

.hero-bg{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 70% 50%,rgba(192,132,252,.08),transparent),
             radial-gradient(ellipse 50% 40% at 20% 80%,rgba(34,211,238,.05),transparent);
}

.hero-grid-lines{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(192,132,252,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(192,132,252,.04) 1px,transparent 1px);
  background-size:60px 60px;
}

.hero-left{
  padding:5rem 3rem 4rem;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;z-index:2;
  border-left:1px solid var(--bd);
}

.hero-badge{
  display:inline-flex;align-items:center;gap:.45rem;
  background:rgba(192,132,252,.1);border:1px solid rgba(192,132,252,.3);
  border-radius:99px;padding:.3rem .9rem;
  font-size:.74rem;font-weight:600;color:var(--ac);
  width:fit-content;margin-bottom:1.8rem;
  animation:fadeUp .6s ease both;
}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}

.hero-h1{
  font-family:var(--display);
  font-size:clamp(2.4rem,3.8vw,4.2rem);
  font-weight:900;line-height:1.05;letter-spacing:-1px;
  margin-bottom:1.4rem;
  animation:fadeUp .6s .1s ease both;
}
.hero-h1 .grd-text{
  background:var(--grd);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;
}
.hero-h1 .grd2-text{
  background:var(--grd2);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;
}

.hero-desc{
  font-size:1rem;color:var(--mx);line-height:1.75;
  max-width:440px;margin-bottom:2.5rem;
  animation:fadeUp .6s .2s ease both;
}

.hero-ctas{display:flex;gap:.75rem;flex-wrap:wrap;animation:fadeUp .6s .3s ease both}

.btn-grd{
  background:var(--grd);color:#fff;border:none;
  padding:.85rem 2rem;border-radius:var(--r);
  font-family:var(--sans);font-size:.92rem;font-weight:600;
  cursor:pointer;transition:all .25s;
  display:flex;align-items:center;gap:.45rem;
  box-shadow:0 4px 20px rgba(192,132,252,.3);
}
.btn-grd:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(192,132,252,.5)}

.btn-ghost{
  background:transparent;color:var(--tx);
  border:1px solid var(--bd2);
  padding:.85rem 2rem;border-radius:var(--r);
  font-family:var(--sans);font-size:.92rem;font-weight:600;
  cursor:pointer;transition:all .25s;
}
.btn-ghost:hover{border-color:var(--ac);color:var(--ac);transform:translateY(-2px)}

.hero-crypto-row{
  display:flex;gap:1rem;margin-top:2.8rem;padding-top:2rem;
  border-top:1px solid var(--bd);flex-wrap:wrap;
  animation:fadeUp .6s .4s ease both;
}
.crypto-pill{
  display:flex;align-items:center;gap:.5rem;
  background:var(--s2);border:1px solid var(--bd);
  border-radius:10px;padding:.45rem .85rem;
  font-size:.78rem;transition:all .2s;cursor:default;
}
.crypto-pill:hover{border-color:var(--bd2)}
.crypto-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff}
.ci-btc{background:var(--btc)} .ci-eth{background:var(--eth)} .ci-sol{background:var(--sol)} .ci-usdt{background:var(--usdt)}
.cp-sym{font-family:var(--mono);font-size:.73rem;font-weight:500;color:var(--mx)}
.cp-chg{font-family:var(--mono);font-size:.7rem;font-weight:600}
.chg-up{color:var(--green)} .chg-dn{color:var(--red)}

/* HERO RIGHT */
.hero-right{
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;padding:3rem;
}

.hero-card-stack{position:relative;width:320px;height:420px}

.hcard-main{
  position:absolute;top:40px;right:0;
  width:300px;
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--r2);padding:1.8rem;
  box-shadow:0 24px 64px rgba(0,0,0,.6);
  animation:float 5s ease-in-out infinite;
  z-index:3;
}
.hcard-bg{
  position:absolute;top:10px;right:10px;
  width:300px;height:380px;
  background:linear-gradient(135deg,rgba(192,132,252,.15),rgba(99,102,241,.1));
  border-radius:var(--r2);border:1px solid rgba(192,132,252,.2);
  z-index:2;
}
.hcard-bg2{
  position:absolute;top:20px;right:20px;
  width:300px;height:380px;
  background:rgba(192,132,252,.04);
  border-radius:var(--r2);border:1px solid rgba(192,132,252,.1);
  z-index:1;
}

.hcard-thumb{
  width:100%;height:150px;border-radius:14px;
  background:linear-gradient(135deg,#7C3AED,#C084FC);
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;margin-bottom:1.2rem;
  position:relative;overflow:hidden;
}
.hcard-thumb::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(rgba(255,255,255,.1),transparent);
}

.hcard-cat{
  font-family:var(--mono);font-size:.65rem;font-weight:500;
  color:var(--ac);letter-spacing:1.5px;margin-bottom:.35rem;
  text-transform:uppercase;
}
.hcard-title{font-size:.97rem;font-weight:700;margin-bottom:.4rem}
.hcard-desc{font-size:.78rem;color:var(--mx);margin-bottom:1.1rem;line-height:1.5}

.hcard-footer{display:flex;align-items:center;justify-content:space-between}
.hcard-price-wrap .old{font-size:.72rem;color:var(--dim);text-decoration:line-through;font-family:var(--mono)}
.hcard-price{font-family:var(--mono);font-size:1.25rem;font-weight:500;color:var(--ac2)}
.hcard-btn{
  background:var(--grd);color:#fff;border:none;
  padding:.45rem 1.1rem;border-radius:9px;
  font-size:.78rem;font-weight:600;cursor:pointer;
  font-family:var(--sans);transition:all .2s;
}
.hcard-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(192,132,252,.4)}

.float-chip{
  position:absolute;background:var(--s1);border:1px solid var(--bd);
  border-radius:12px;padding:.65rem .9rem;
  display:flex;align-items:center;gap:.55rem;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  font-size:.73rem;white-space:nowrap;z-index:10;
  animation:float 5s ease-in-out infinite;
}
.fc-1{top:0;left:-70px;animation-delay:.5s}
.fc-2{bottom:30px;left:-60px;animation-delay:1.2s}
.fc-3{bottom:80px;right:-20px;animation-delay:.8s}
.fc-ico{font-size:1rem}
.fc-lbl{font-weight:700}
.fc-sub{font-size:.65rem;color:var(--mx)}

/* ─── CRYPTO PRICE TICKER ─── */
.price-ticker{
  background:var(--s1);border-top:1px solid var(--bd);
  border-bottom:1px solid var(--bd);
  padding:.6rem 0;overflow:hidden;
}
.pt-inner{
  display:flex;gap:3rem;white-space:nowrap;
  animation:marquee 25s linear infinite;width:max-content;
}
.pt-item{
  display:inline-flex;align-items:center;gap:.5rem;
  font-family:var(--mono);font-size:.78rem;
}
.pt-sym{font-weight:500;color:var(--mx)}
.pt-price{color:var(--tx)}
.pt-up{color:var(--green)} .pt-dn{color:var(--red)}
.pt-sep{color:var(--bd2);margin:0 .5rem}

/* ─── FLASH SALE SECTION ─── */
.flash-sale{
  background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(251,146,60,.05));
  border-bottom:1px solid rgba(245,158,11,.2);
  padding:1.4rem 2.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  flex-wrap:wrap;
}
.fs-left{display:flex;align-items:center;gap:1.2rem}
.fs-badge{
  background:var(--ac2);color:#000;
  font-family:var(--display);font-size:.72rem;font-weight:700;
  padding:.3rem .75rem;border-radius:6px;letter-spacing:.5px;
  animation:glow 2s infinite;
}
.fs-text h3{font-size:1rem;font-weight:700;margin-bottom:.15rem}
.fs-text p{font-size:.78rem;color:var(--mx)}
.fs-timer{display:flex;align-items:center;gap:.5rem}
.timer-block{
  background:var(--s2);border:1px solid var(--bd);
  border-radius:10px;padding:.6rem .9rem;text-align:center;min-width:56px;
}
.timer-num{font-family:var(--display);font-size:1.4rem;font-weight:700;color:var(--ac2);line-height:1}
.timer-lbl{font-size:.6rem;color:var(--mx);margin-top:.2rem;font-weight:500}
.timer-colon{font-family:var(--display);font-size:1.4rem;color:var(--bd2)}
.fs-btn{
  background:var(--ac2);color:#000;border:none;
  padding:.7rem 1.6rem;border-radius:var(--r);
  font-family:var(--sans);font-size:.88rem;font-weight:700;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.fs-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(245,158,11,.4)}

/* ─── SECTION BASE ─── */
.section{padding:5rem 2.5rem;position:relative}

.sec-tag{
  font-family:var(--mono);font-size:.68rem;font-weight:500;
  color:var(--ac);letter-spacing:2px;text-transform:uppercase;margin-bottom:.5rem;
}
.sec-title{
  font-family:var(--display);font-size:1.9rem;font-weight:700;
  letter-spacing:-.5px;margin-bottom:.5rem;
}
.sec-sub{font-size:.9rem;color:var(--mx);line-height:1.65}
.sec-hd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:3rem}
.link-all{font-size:.83rem;font-weight:600;color:var(--mx);text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:.3rem}
.link-all:hover{color:var(--ac)}

/* ─── GLOBAL STATS ─── */
.stats-bar{
  background:var(--s1);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);
  padding:2.5rem;display:grid;grid-template-columns:repeat(5,1fr);
  gap:1rem;text-align:center;
}
.stat-box{padding:1rem;border-left:1px solid var(--bd);position:relative}
.stat-box:last-child{border-left:none}
.stat-n{
  font-family:var(--display);font-size:2rem;font-weight:700;
  background:var(--grd);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;
  display:block;margin-bottom:.3rem;
}
.stat-l{font-size:.78rem;color:var(--mx)}

/* ─── CATEGORIES ─── */
.cats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.cat-card{
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--r2);padding:1.8rem 1.5rem;
  cursor:pointer;transition:all .25s;text-decoration:none;color:var(--tx);
  position:relative;overflow:hidden;display:block;
}
.cat-card::before{
  content:'';position:absolute;inset:0;opacity:0;
  transition:opacity .3s;border-radius:inherit;
}
.cc1::before{background:radial-gradient(circle at 0% 0%,rgba(192,132,252,.12),transparent 60%)}
.cc2::before{background:radial-gradient(circle at 0% 0%,rgba(34,211,238,.1),transparent 60%)}
.cc3::before{background:radial-gradient(circle at 0% 0%,rgba(245,158,11,.1),transparent 60%)}
.cc4::before{background:radial-gradient(circle at 0% 0%,rgba(16,185,129,.1),transparent 60%)}
.cc5::before{background:radial-gradient(circle at 0% 0%,rgba(239,68,68,.1),transparent 60%)}
.cc6::before{background:radial-gradient(circle at 0% 0%,rgba(249,115,22,.1),transparent 60%)}
.cc7::before{background:radial-gradient(circle at 0% 0%,rgba(99,102,241,.1),transparent 60%)}
.cc8::before{background:radial-gradient(circle at 0% 0%,rgba(153,69,255,.1),transparent 60%)}
.cat-card:hover{border-color:var(--bd2);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.cat-card:hover::before{opacity:1}
.cat-ico-wrap{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:1rem}
.cat-name{font-size:.9rem;font-weight:700;margin-bottom:.25rem}
.cat-cnt{font-size:.74rem;color:var(--mx)}

/* ─── PRODUCTS ─── */
.prods-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem}

.prod-card{
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--r2);overflow:hidden;
  transition:all .3s;cursor:pointer;display:flex;flex-direction:column;
  position:relative;
}
.prod-card:hover{border-color:var(--bd2);transform:translateY(-5px);box-shadow:0 20px 50px rgba(0,0,0,.5)}

.wishlist-btn{
  position:absolute;top:1rem;left:1rem;z-index:5;
  width:32px;height:32px;border-radius:50%;
  background:rgba(9,8,10,.7);backdrop-filter:blur(8px);
  border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.95rem;transition:all .2s;
}
.wishlist-btn:hover{border-color:var(--red);transform:scale(1.1)}
.wishlist-btn.active{background:rgba(239,68,68,.2);border-color:var(--red)}

.prod-thumb{
  height:180px;display:flex;align-items:center;justify-content:center;
  font-size:3.2rem;position:relative;overflow:hidden;
}
.pt1{background:linear-gradient(135deg,#7C3AED,#C084FC)}
.pt2{background:linear-gradient(135deg,#0284C7,#38BDF8)}
.pt3{background:linear-gradient(135deg,#065F46,#10B981)}
.pt4{background:linear-gradient(135deg,#92400E,#F59E0B)}
.pt5{background:linear-gradient(135deg,#9D174D,#EC4899)}
.pt6{background:linear-gradient(135deg,#1E3A8A,#3B82F6)}

.prod-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.45);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;gap:.6rem;
  opacity:0;transition:opacity .25s;
}
.prod-card:hover .prod-overlay{opacity:1}

.ov-btn{
  background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.2);color:#fff;
  padding:.45rem .9rem;border-radius:99px;
  font-size:.76rem;font-weight:600;cursor:pointer;
  font-family:var(--sans);transition:all .2s;
}
.ov-btn:hover{background:rgba(255,255,255,.25)}
.ov-buy{background:var(--ac);border-color:var(--ac)}
.ov-buy:hover{background:#a855f7}

.prod-body{padding:1.25rem;flex:1;display:flex;flex-direction:column}
.prod-tags{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.7rem}
.tag{font-size:.65rem;font-weight:600;padding:.18rem .55rem;border-radius:6px;font-family:var(--mono)}
.tnew{background:rgba(34,211,238,.15);color:var(--ac3)}
